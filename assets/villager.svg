  <path d="M24 78c0-2.5 2.5-4 5-4h3.5v10c-5 1.2-8.5-1.2-8.5-6z" fill="#3d2a14" stroke="#1c140c" stroke-width="1"/>
  <path d="M39.5 74H43c2.5 0 5 1.5 5 4 0 4.8-3.5 7.2-8.5 6V74z" fill="#3d2a14" stroke="#1c140c" stroke-width="1"/>
