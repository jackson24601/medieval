  <path d="M22 16c1-8 7-12 14-10 4 1 7 5 7 10H22z" fill="#6b4a28"/>
  <ellipse cx="32" cy="16" rx="13" ry="3.5" fill="#5a3d1c"/>
  <path d="M38 8c3-1 6 1 5 4" stroke="#6b4a28" stroke-width="3" stroke-linecap="round"/>
