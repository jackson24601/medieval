  <rect x="12.5" y="36" width="2" height="28" rx="1" fill="#6b4a28"/>
  <path d="M10 36v-8M13.5 36v-10M17 36v-8" stroke="#6b7280" stroke-width="1.6" stroke-linecap="round"/>
