  <circle cx="29" cy="19" r="1.1" fill="#3d2a14"/>
  <circle cx="35" cy="19" r="1.1" fill="#3d2a14"/>
  <path d="M30 23c1 1 3 1 4 0" stroke="#3d2a14" stroke-width="1" stroke-linecap="round"/>
