  <path d="M24 18c1.2-10 8.5-14.5 16.5-12 5 1.4 8.5 6 8.5 12H24z" fill="#8b5a2b" stroke="#2a1a0a" stroke-width="1.4"/>
  <ellipse cx="36" cy="18" rx="16" ry="4.2" fill="#6b4a28" stroke="#2a1a0a" stroke-width="1.2"/>
  <path d="M43 8c4-1.5 7.5 1.5 6 5" stroke="#8b5a2b" stroke-width="4" stroke-linecap="round"/>
