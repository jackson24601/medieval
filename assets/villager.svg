  <path d="M20 34c-4 2-7 6-7 10 0 2 1 3 3 3h3v-6l1-7z" fill="#8b5a2b"/>
  <path d="M44 34c4 2 7 6 7 10 0 2-1 3-3 3h-3v-6l-1-7z" fill="#8b5a2b"/>
