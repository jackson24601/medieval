  <path d="M22 66c0-2 2-3 4-3h3v8c-4 1-7-1-7-5z" fill="#4a3422"/>
  <path d="M35 63h3c2 0 4 1 4 3 0 4-3 6-7 5v-8z" fill="#4a3422"/>
  <!-- legs -->
  <rect x="24" y="48" width="7" height="16" rx="2" fill="#d8c7a2"/>
  <rect x="33" y="48" width="7" height="16" rx="2" fill="#cbb892"/>
  <!-- tunic -->
  <path d="M20 28c2-3 6-5 12-5s10 2 12 5l4 8c1 3 0 6-2 8l-3 12H21l-3-12c-2-2-3-5-2-8l4-8z" fill="#8b5a2b"/>
  <path d="M26 31c2-1 4-2 6-2s4 1 6 2" stroke="#5c3a18" stroke-width="1.5" stroke-linecap="round"/>
  <!-- belt -->
  <rect x="22" y="46" width="20" height="3" rx="1" fill="#3d2a14"/>
  <rect x="30" y="45.5" width="4" height="4" rx="0.5" fill="#c9a35a"/>
