  <rect x="37" y="56" width="8" height="20" rx="2.5" fill="#e5d4a8" stroke="#5a4a3a" stroke-width="1"/>
  <!-- tunic -->
  <path d="M22 32c2.5-4 7-6 14-6s11.5 2 14 6l5 10c1.2 3.5 0 7-2.5 9.5l-3.5 14H23l-3.5-14C17 49 15.8 45.5 17 42l5-10z" fill="#c47a2c" stroke="#2a1a0a" stroke-width="1.5"/>
  <path d="M29 36c2.2-1.2 4.5-2 7-2s4.8 0.8 7 2" stroke="#6b3f14" stroke-width="1.8" stroke-linecap="round"/>
  <!-- belt -->
  <rect x="24" y="54" width="24" height="4" rx="1.2" fill="#2a1a0a"/>
  <rect x="33" y="53.5" width="6" height="5" rx="1" fill="#f0d27a" stroke="#2a1a0a" stroke-width="1"/>
  <!-- arms -->
  <path d="M22 38c-5 2.5-8.5 7-8.5 12 0 2.2 1.2 3.5 3.5 3.5H21v-7.5l1-8z" fill="#c47a2c" stroke="#2a1a0a" stroke-width="1.2"/>
  <path d="M50 38c5 2.5 8.5 7 8.5 12 0 2.2-1.2 3.5-3.5 3.5H51v-7.5l-1-8z" fill="#c47a2c" stroke="#2a1a0a" stroke-width="1.2"/>
  <!-- hands -->
  <circle cx="16" cy="55" r="3.6" fill="#f0c9a0" stroke="#2a1a0a" stroke-width="1"/>
  <circle cx="56" cy="55" r="3.6" fill="#f0c9a0" stroke="#2a1a0a" stroke-width="1"/>
  <!-- pitchfork -->
  <rect x="13.2" y="40" width="2.6" height="34" rx="1.2" fill="#6b4a28" stroke="#2a1a0a" stroke-width="0.8"/>
  <path d="M10 40v-10M14.5 40v-12M19 40v-10" stroke="#7a8494" stroke-width="2.2" stroke-linecap="round"/>
  <!-- head -->
  <circle cx="36" cy="22" r="11" fill="#f0c9a0" stroke="#2a1a0a" stroke-width="1.5"/>
  <!-- beard -->
  <path d="M27 24c1.5 6 4.8 9 9 9s7.5-3 9-9" fill="#6b4a28"/>
  <!-- face -->
  <circle cx="32" cy="21" r="1.4" fill="#2a1a0a"/>
  <circle cx="40" cy="21" r="1.4" fill="#2a1a0a"/>
  <path d="M33 26c1.2 1.2 3.5 1.2 5 0" stroke="#2a1a0a" stroke-width="1.2" stroke-linecap="round"/>
