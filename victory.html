<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Victory — Humans vs. Goblins</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Fraunces:opsz,wght@9..144,500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=victory-feast" />
  </head>
  <body class="feast-body">
    <main class="feast" aria-label="Victory feast">
      <div class="feast__scene" aria-hidden="true">
        <img
          class="feast__image"
          src="assets/victory-feast.jpg"
          alt=""
          width="1536"
          height="1024"
        />
        <div class="feast__veil"></div>
      </div>
      <div class="feast__embers" aria-hidden="true"></div>

      <div class="feast__content">
        <h1 class="title feast__brand" aria-label="Humans vs. Goblins">
          <span class="title__line">Humans</span>
          <span class="title__vs">vs.</span>
          <span class="title__line">Goblins</span>
        </h1>
        <p class="feast__tagline">Victory — the realm is safe, and the feast begins.</p>
        <a class="start-box" href="index.html">Play Again</a>
      </div>
    </main>
  </body>
</html>
